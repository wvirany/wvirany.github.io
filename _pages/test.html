<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

.box {
    border-width: 2px;
    border-color: rgb(213, 213, 213);
    /* border: 5px rgb(213, 213, 213); */
    border-radius: 5px; /* 5px rounded corners */
    background-color: rgb(48, 47, 47);
    width: 75%;
}

.card {
  border-width: 2px;
  border-color: rgb(103, 102, 102);
  background-color: rgb(47, 47, 47);
  transition: 0.3s;
  border-radius: 5px; /* 5px rounded corners */
  width: 75%;
}

.container {
  padding-top: 2px;
  padding-left: 2px;
  float: top;
}

</style>

<body>

    <div class="box">
        <h2 style="float:top; padding: 2px">Education</h2>
    </div>

    <div class="card">
        <div class="container">
            <h2>Education</h2>
        </div>
    </div>

    <div class="card">
        <h2><b>Skills</b></h2>
        <div class="container">
            <p>Some text</p>
        </div>
    </div>
    
</body>
</html>
